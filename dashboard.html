<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>簽到 Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0B1120; --surface: #131C2E; --surface2: #1A2540;
    --border: rgba(255,255,255,0.07); --accent: #4F8EF7;
    --text: #F0F4FF; --text-muted: #8899BB; --radius: 16px;
    --c1: #4F8EF7; --c2: #7C3AED; --c3: #10B981; --c4: #F59E0B;
  }
  body {
    font-family: 'Noto Sans TC', 'Inter', sans-serif;
    background: var(--bg); min-height: 100vh;
    background-image:
      radial-gradient(ellipse 60% 40% at 10% 10%, rgba(79,142,247,0.08), transparent),
      radial-gradient(ellipse 50% 50% at 90% 90%, rgba(124,58,237,0.08), transparent);
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.5rem 2rem; border-bottom: 1px solid var(--border);
    background: rgba(19,28,46,0.9); backdrop-filter: blur(10px);
    position: sticky; top: 0; z-index: 10;
  }
  .live-dot {
    width: 8px; height: 8px; background: #10B981; border-radius: 50%;
    display: inline-block; animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    50% { opacity:0.7; box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }
  .header-left h1 { font-size: 1.1rem; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .last-update { font-size: 0.78rem; color: var(--text-muted); }
  .clear-btn {
    background: transparent; border: 1px solid rgba(248,113,113,0.3);
    border-radius: 8px; color: #F87171; font-family: 'Noto Sans TC', sans-serif;
    font-size: 0.78rem; padding: 5px 12px; cursor: pointer; transition: background 0.2s;
  }
  .clear-btn:hover { background: rgba(248,113,113,0.1); }
  main { padding: 2rem; max-width: 1100px; margin: 0 auto; }
  .total-banner {
    background: linear-gradient(135deg, rgba(79,142,247,0.15), rgba(124,58,237,0.15));
    border: 1px solid rgba(79,142,247,0.25); border-radius: var(--radius);
    padding: 1.5rem 2rem; display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .total-banner .label { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 4px; }
  .total-banner .number { font-size: 3rem; font-weight: 700; color: var(--text); font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; }
  .total-banner .sub { font-size: 0.85rem; color: var(--text-muted); }
  .dept-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
  .dept-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; position: relative; overflow: hidden; }
  .dept-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .dept-card.c0::before { background: var(--c1); }
  .dept-card.c1::before { background: var(--c2); }
  .dept-card.c2::before { background: var(--c3); }
  .dept-card.c3::before { background: var(--c4); }
  .dept-card .d-name { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 0.5rem; font-weight: 500; }
  .dept-card .d-count { font-size: 2.5rem; font-weight: 700; font-family: 'Inter', sans-serif; font-variant-numeric: tabular-nums; line-height: 1; }
  .dept-card.c0 .d-count { color: var(--c1); }
  .dept-card.c1 .d-count { color: var(--c2); }
  .dept-card.c2 .d-count { color: var(--c3); }
  .dept-card.c3 .d-count { color: var(--c4); }
  .dept-card .d-bar-wrap { margin-top: 0.75rem; background: var(--surface2); height: 4px; border-radius: 99px; overflow: hidden; }
  .dept-card .d-bar { height: 100%; border-radius: 99px; transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1); }
  .dept-card.c0 .d-bar { background: var(--c1); }
  .dept-card.c1 .d-bar { background: var(--c2); }
  .dept-card.c2 .d-bar { background: var(--c3); }
  .dept-card.c3 .d-bar { background: var(--c4); }
  .dept-card .d-pct { font-size: 0.75rem; color: var(--text-muted); margin-top: 6px; }
  .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 700px) { .panels { grid-template-columns: 1fr; } }
  .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem 1.5rem; }
  .panel-title { font-size: 0.8rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 1rem; }
  .chart-bars { display: flex; align-items: flex-end; gap: 12px; height: 140px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; height: 100%; }
  .bar-inner { flex: 1; width: 100%; display: flex; align-items: flex-end; }
  .bar-fill { width: 100%; border-radius: 6px 6px 0 0; transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1); min-height: 4px; }
  .bar-label { font-size: 0.62rem; color: var(--text-muted); margin-top: 6px; text-align: center; line-height: 1.3; max-width: 54px; }
  .bar-num { font-size: 0.8rem; font-weight: 600; color: var(--text); font-family: 'Inter', sans-serif; margin-bottom: 4px; }
  .log-list { max-height: 210px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--surface2) transparent; }
  .log-item { display: flex; align-items: center; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid var(--border); animation: slideIn 0.3s ease; }
  .log-item:last-child { border-bottom: none; }
  @keyframes slideIn { from { opacity:0; transform: translateY(-6px); } to { opacity:1; } }
  .log-left { display: flex; align-items: center; gap: 8px; }
  .log-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 700; flex-shrink: 0; }
  .log-name { font-size: 0.85rem; color: var(--text); }
  .log-dept { font-size: 0.72rem; color: var(--text-muted); }
  .log-time { font-size: 0.72rem; color: var(--text-muted); font-family: 'Inter', sans-serif; }
  .empty-state { text-align: center; padding: 2rem 0; color: var(--text-muted); font-size: 0.85rem; }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1><span class="live-dot"></span> 簽到 Dashboard</h1>
  </div>
  <div class="header-right">
    <span class="last-update" id="last-update">連線中...</span>
    <button class="clear-btn" onclick="clearData()">清除資料</button>
  </div>
</header>
<main>
  <div class="total-banner">
    <div>
      <div class="label">總簽到人數</div>
      <div class="number" id="total-count">—</div>
      <div class="sub">位與會人員已完成簽到</div>
    </div>
    <div style="text-align:right">
      <div class="label" id="banner-date"></div>
      <div style="font-size:0.82rem;color:var(--text-muted);margin-top:4px;">Firebase 即時同步中</div>
    </div>
  </div>
  <div class="dept-grid" id="dept-grid"></div>
  <div class="panels">
    <div class="panel">
      <div class="panel-title">各單位人數比較</div>
      <div class="chart-bars" id="chart-bars"></div>
    </div>
    <div class="panel">
      <div class="panel-title">最新簽到記錄</div>
      <div class="log-list" id="log-list"></div>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDi1sR_j03KhZ2pK8-WO3MY6O03ML7LCHA",
  authDomain: "meeting-checkin-bf76e.firebaseapp.com",
  databaseURL: "https://meeting-checkin-bf76e-default-rtdb.firebaseio.com",
  projectId: "meeting-checkin-bf76e",
  storageBucket: "meeting-checkin-bf76e.firebasestorage.app",
  messagingSenderId: "89786520766",
  appId: "1:89786520766:web:abbcd2b78a9fae762dfaef"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const checkinRef = ref(db, 'checkins');

const DEPTS = ['法金產品發展部', '法金產品行銷部', '法人信託部', '其他'];
const COLORS = ['#4F8EF7', '#7C3AED', '#10B981', '#F59E0B'];

function fmtTime(iso) {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function render(snapshot) {
  const data = snapshot.val();
  const records = data ? Object.values(data) : [];
  const total = records.length;

  const counts = {};
  DEPTS.forEach(d => counts[d] = 0);
  records.forEach(r => { if (counts[r.dept] !== undefined) counts[r.dept]++; });
  const maxCount = Math.max(...Object.values(counts), 1);

  document.getElementById('total-count').textContent = total;
  document.getElementById('last-update').textContent = total > 0
    ? `最後更新 ${fmtTime(records[records.length-1].time)}`
    : '尚無資料';

  const now = new Date();
  document.getElementById('banner-date').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  document.getElementById('dept-grid').innerHTML = DEPTS.map((d, i) => {
    const pct = total > 0 ? Math.round(counts[d] / total * 100) : 0;
    return `<div class="dept-card c${i}">
      <div class="d-name">${d}</div>
      <div class="d-count">${counts[d]}</div>
      <div class="d-bar-wrap"><div class="d-bar" style="width:${pct}%"></div></div>
      <div class="d-pct">${pct}% 的與會人員</div>
    </div>`;
  }).join('');

  document.getElementById('chart-bars').innerHTML = DEPTS.map((d, i) => {
    const h = Math.max(Math.round(counts[d] / maxCount * 100), 4);
    return `<div class="bar-col">
      <div class="bar-inner">
        <div style="display:flex;flex-direction:column;align-items:center;width:100%;justify-content:flex-end;">
          <div class="bar-num">${counts[d]}</div>
          <div class="bar-fill" style="height:${h}%;background:${COLORS[i]};"></div>
        </div>
      </div>
      <div class="bar-label">${d}</div>
    </div>`;
  }).join('');

  const log = document.getElementById('log-list');
  if (records.length === 0) {
    log.innerHTML = '<div class="empty-state">尚無簽到記錄</div>';
    return;
  }
  log.innerHTML = [...records].reverse().slice(0, 25).map(r => {
    const di = DEPTS.indexOf(r.dept);
    const color = COLORS[di] || '#8899BB';
    return `<div class="log-item">
      <div class="log-left">
        <div class="log-avatar" style="background:${color}22;color:${color};">${r.name.slice(-2)}</div>
        <div>
          <div class="log-name">${r.name}</div>
          <div class="log-dept">${r.dept}</div>
        </div>
      </div>
      <div class="log-time">${fmtTime(r.time)}</div>
    </div>`;
  }).join('');
}

onValue(checkinRef, render);

window.clearData = function() {
  if (confirm('確定要清除所有簽到資料嗎？')) {
    remove(checkinRef);
  }
};
</script>
</body>
</html>
